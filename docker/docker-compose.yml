version: "3.8"

services:

  # ── HDFS Namenode ──────────────────────────────────────────────────────────
  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: neuromining-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # HDFS Web UI
      - "8020:8020"   # HDFS RPC
    environment:
      - CLUSTER_NAME=neuromining
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./volumes/shared:/data/shared
    networks:
      - neuromining-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      retries: 5

  # ── HDFS Datanode ──────────────────────────────────────────────────────────
  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: neuromining-datanode
    restart: unless-stopped
    ports:
      - "9864:9864"   # Datanode Web UI
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./volumes/shared:/data/shared
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    networks:
      - neuromining-net

  # ── PostgreSQL (Hive Metastore backend) ────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: neuromining-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hive_metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuromining-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive_metastore"]
      interval: 10s
      retries: 5

  # ── Hive Metastore ─────────────────────────────────────────────────────────
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: neuromining-hive-metastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/hive_metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive_secret"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "hdfs://hadoop-namenode:8020/user/hive/warehouse"
    depends_on:
      postgres:
        condition: service_healthy
      hadoop-namenode:
        condition: service_healthy
    networks:
      - neuromining-net

  # ── Hive Server2 ───────────────────────────────────────────────────────────
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: neuromining-hive-server
    restart: unless-stopped
    ports:
      - "10000:10000"  # HiveServer2 JDBC
      - "10002:10002"  # HiveServer2 Web UI
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/hive_metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive_secret"
      HIVE_SITE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
      HIVE_SITE_CONF_hive_execution_engine: "spark"
    depends_on:
      - hive-metastore
    networks:
      - neuromining-net

  # ── Spark Master ───────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.4.1
    container_name: neuromining-spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"    # Spark Web UI
      - "7077:7077"    # Spark Master RPC
      - "4040:4040"    # Spark App UI
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_CONF_spark_hadoop_fs_defaultFS=hdfs://hadoop-namenode:8020
      - SPARK_CONF_spark_sql_warehouse_dir=hdfs://hadoop-namenode:8020/user/hive/warehouse
      - SPARK_CONF_spark_sql_hive_metastore_uris=thrift://hive-metastore:9083
    volumes:
      - ./volumes/shared:/data/shared
      - ../spark:/opt/spark-jobs
    depends_on:
      - hive-metastore
    networks:
      - neuromining-net

  # ── Spark Worker ───────────────────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.4.1
    container_name: neuromining-spark-worker
    restart: unless-stopped
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_CONF_spark_hadoop_fs_defaultFS=hdfs://hadoop-namenode:8020
    volumes:
      - ./volumes/shared:/data/shared
    depends_on:
      - spark-master
    networks:
      - neuromining-net

volumes:
  namenode_data:
  datanode_data:
  postgres_data:

networks:
  neuromining-net:
    driver: bridge
