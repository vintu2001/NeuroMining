services:


  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: neuromining-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"
      - "8020:8020"
    environment:
      - CLUSTER_NAME=neuromining
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./volumes/shared:/data/shared
    networks:
      - neuromining-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      retries: 5


  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: neuromining-datanode
    restart: unless-stopped
    ports:
      - "9864:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./volumes/shared:/data/shared
    depends_on:
      hadoop-namenode:
        condition: service_healthy
    networks:
      - neuromining-net


  postgres:
    image: postgres:14-alpine
    container_name: neuromining-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hive_metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_secret
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neuromining-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d hive_metastore"]
      interval: 10s
      retries: 5


  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: neuromining-hive-metastore
    restart: unless-stopped
    command: ["hive", "--service", "metastore"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      CORE_CONF_fs_defaultFS: "hdfs://hadoop-namenode:8020"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/hive_metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive_secret"
      HIVE_SITE_CONF_hive_metastore_warehouse_dir: "hdfs://hadoop-namenode:8020/user/hive/warehouse"
    depends_on:
      postgres:
        condition: service_healthy
      hadoop-namenode:
        condition: service_healthy
    networks:
      - neuromining-net


  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: neuromining-hive-server
    restart: unless-stopped
    command: ["hiveserver2", "--hiveconf", "hive.server2.enable.doAs=false"]
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      CORE_CONF_fs_defaultFS: "hdfs://hadoop-namenode:8020"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/hive_metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive_secret"
      HIVE_SITE_CONF_hive_metastore_uris: "thrift://hive-metastore:9083"
      HIVE_SITE_CONF_hive_execution_engine: "mr"
    depends_on:
      - hive-metastore
    networks:
      - neuromining-net


  spark-master:
    image: apache/spark:3.5.3
    container_name: neuromining-spark-master
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_CONF_DIR=/opt/spark/conf
    volumes:
      - ./volumes/shared:/data/shared
      - ../spark:/opt/spark-jobs
    depends_on:
      - hive-metastore
    networks:
      - neuromining-net


  spark-worker:
    image: apache/spark:3.5.3
    container_name: neuromining-spark-worker
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./volumes/shared:/data/shared
    depends_on:
      - spark-master
    networks:
      - neuromining-net

volumes:
  namenode_data:
  datanode_data:
  postgres_data:

networks:
  neuromining-net:
    driver: bridge
